<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>Track-App Promo V2 - The Kept Funds Cut</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/TextPlugin.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'safety-orange': '#F97316',
              'electric-blue': '#3B82F6',
              'paypal-blue': '#003087',
              'pain-red': '#7f1d1d',
            },
            fontFamily: {
              heading: ['Space Grotesk', 'sans-serif'],
              sans: ['Lexend', 'sans-serif']
            }
          }
        }
      }
    </script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px;
        overflow: hidden;
        background: #000;
        font-family: 'Lexend', sans-serif;
      }
      .clip { position: absolute; inset: 0; overflow: hidden; display: none; }
      .clip.active { display: block; }
      
      .tiktok-text {
        font-size: 110px; font-weight: 900; font-family: 'Space Grotesk';
        color: white; text-transform: uppercase; line-height: 1.1;
        text-align: center; text-shadow: 0 20px 50px rgba(0,0,0,0.9);
        position: absolute; z-index: 100; width: 100%; padding: 0 40px;
      }
      .highlight-orange { background: #F97316; padding: 10px 30px; border-radius: 20px; display: inline-block; margin-top: 20px; }
      
      .glass-ui {
        background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(25px);
        border: 4px solid white; border-radius: 60px;
        box-shadow: 0 50px 100px rgba(0,0,0,0.2);
      }

      /* Custom Leaflet overrides */
      .custom-marker { background: #3B82F6; border: 4px solid white; border-radius: 50%; box-shadow: 0 0 30px rgba(59,130,246,0.8); }
      .dest-marker { background: #F97316; border: 4px solid white; border-radius: 50%; box-shadow: 0 0 40px rgba(249,115,22,1); }
      .map-dim { position: absolute; inset: 0; background: rgba(255,255,255,0.4); pointer-events: none; z-index: 5; }

      /* Audio Cues Visualizer (Hidden) */
      .audio-cue { display: none; }
      .global-subtitles {
        position: absolute;
        bottom: 15%;
        left: 0;
        width: 100%;
        text-align: center;
        z-index: 1000;
        pointer-events: none;
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 900;
        text-transform: uppercase;
        color: #FFD700; /* Viral Yellow */
        text-shadow: 0 4px 0 #000, 4px 4px 0 #000, -2px -2px 0 #000;
        font-size: 110px;
        line-height: 1.1;
        padding: 0 40px;
      }
      .subtitle-word {
        display: inline-block;
        margin: 0 15px; /* Fix word bunching */
        opacity: 0;
        transform: scale(0);
      }
      /* tiktok-text is replaced by global-subtitles */
      .tiktok-text { display: none; }

      /* iPhone Mockup - Realistic iPhone 15 Pro */
      .iphone-frame {
        width: 700px;
        height: 1380px;
        background: linear-gradient(160deg, #2a2a2a 0%, #1a1a1a 40%, #141414 60%, #222 100%);
        border-radius: 90px;
        padding: 18px;
        box-shadow:
          0 0 0 1.5px #3a3a3a,
          0 0 0 3px #0d0d0d,
          0 0 0 5px #2a2a2a,
          0 40px 160px rgba(0,0,0,0.9),
          0 0 120px rgba(249,115,22,0.12),
          inset 0 1px 0 rgba(255,255,255,0.08);
        position: relative;
        flex-shrink: 0;
      }
      .iphone-screen {
        width: 100%;
        height: 100%;
        background: #000;
        border-radius: 74px;
        overflow: hidden;
        position: relative;
      }
      
      #intro-video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .dynamic-island {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        width: 156px;
        height: 40px;
        background: #000;
        border-radius: 24px;
        z-index: 20;
      }
      .iphone-btn-power {
        position: absolute;
        right: -6px;
        top: 220px;
        width: 5px;
        height: 100px;
        background: linear-gradient(to right, #1a1a1a, #2d2d2d);
        border-radius: 0 3px 3px 0;
      }
      .iphone-btn-vol1 {
        position: absolute;
        left: -6px;
        top: 160px;
        width: 5px;
        height: 60px;
        background: linear-gradient(to left, #1a1a1a, #2d2d2d);
        border-radius: 3px 0 0 3px;
      }
      .iphone-btn-vol2 {
        position: absolute;
        left: -6px;
        top: 240px;
        width: 5px;
        height: 60px;
        background: linear-gradient(to left, #1a1a1a, #2d2d2d);
        border-radius: 3px 0 0 3px;
      }
      .iphone-btn-mute {
        position: absolute;
        left: -6px;
        top: 120px;
        width: 5px;
        height: 36px;
        background: linear-gradient(to left, #1a1a1a, #2d2d2d);
        border-radius: 3px 0 0 3px;
      }

      /* Notification Rain Styles */
      .notif-rain {
        position: absolute;
        background: white;
        border-radius: 30px;
        padding: 20px 30px;
        width: 600px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        display: flex;
        align-items: center;
        gap: 20px;
        z-index: 50;
        transform: rotate(-5deg);
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="16.5"
      data-width="1080"
      data-height="1920"
    >
      <div class="global-subtitles" id="subtitles"></div>

      <!-- GLOBAL FOOTER (Visible on all scenes) -->
      <div class="absolute bottom-12 w-full z-[100] flex flex-col items-center pointer-events-none">
        <div class="bg-black/50 backdrop-blur-md px-12 py-4 rounded-full border border-white/20 text-white text-5xl font-bold font-mono shadow-2xl" id="global-url">
          www.track-app.io
        </div>
      </div>

      <!-- SCENE 0: VIDEO INTRO (0.0 - 1.5s) -->
      <div class="clip active z-[5]" id="s0" data-start="0" data-duration="1.5" style="background: #000">
        <div class="absolute inset-0 flex items-center justify-center" id="intro-iphone">
          <div class="iphone-frame">
            <div class="dynamic-island"></div>
            <div class="iphone-screen">
              <video id="intro-video" muted playsinline preload="auto" style="width:100%; height:100%; object-fit:cover;">
                <source src="assets/er.mp4" type="video/mp4">
              </video>
            </div>
          </div>
        </div>
      </div>

      <!-- SCENE 1: THE PAIN (1.5 - 4.5s) -->
      <div class="clip z-10 bg-pain-red" id="s1" data-start="1.5" data-duration="3.0">
        <div class="absolute inset-0 opacity-30" style="background-image: repeating-linear-gradient(45deg, #000, #000 10px, transparent 10px, transparent 20px);"></div>
        
        <div class="tiktok-text top-[10%] scale-150" id="s1-text">
          PAYPAL HOLDS?<br>FUNDS FROZEN?
        </div>

        <!-- Notification Rain Container (Moved behind) -->
        <div id="notif-rain-container" class="absolute inset-0 pointer-events-none z-0"></div>

        <div class="absolute inset-0 flex items-center justify-center p-10 -translate-y-40 z-10">
          <div class="w-full bg-white rounded-[60px] p-16 border-[12px] border-red-600 shadow-[0_0_150px_rgba(220,38,38,0.6)]" id="paypal-alert">
            <div class="flex justify-between items-center mb-10">
              <span class="text-paypal-blue font-black italic text-8xl">PayPal</span>
              <span class="bg-red-600 text-white px-8 py-3 rounded-full text-4xl font-bold">HOLD</span>
            </div>
            <div class="text-slate-400 text-4xl font-bold mb-4 uppercase tracking-tighter">Notification</div>
            <div class="text-slate-900 text-[90px] font-black leading-none mb-6">FUNDS ON HOLD</div>
            <div class="text-red-600 text-[130px] font-black leading-none">-$4,500.00</div>
          </div>
        </div>

        <!-- Audio Cue: Riser + Impact -->
        <div class="audio-cue" data-time="0.0" data-label="riser"></div>
        <div class="audio-cue" data-time="1.0" data-label="impact-alert"></div>
      </div>

      <!-- SCENE 2: THE SECRET (4.5 - 8.0s) -->
      <div class="clip z-20 bg-slate-100" id="s2" data-start="4.5" data-duration="3.5">
        <div class="tiktok-text top-[10%] text-slate-900 text-[100px]" id="s2-text">
          THE SECRET?<br>TRACK-APP.
        </div>

        <div class="absolute inset-0 flex items-center justify-center p-10 -translate-y-40" id="s2-ui-container">
          <div class="glass-ui w-full p-16" id="admin-card">
            <div class="flex items-center gap-8 mb-16">
              <div class="w-32 h-32 bg-safety-orange rounded-[40px] flex items-center justify-center shadow-2xl">
                <svg class="w-20 h-20 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4"><path d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
              </div>
              <div class="flex flex-col">
                <span class="text-slate-900 font-black text-7xl font-heading">Track-App</span>
                <span class="bg-blue-600 text-white text-2xl font-bold px-4 py-1 rounded-lg w-fit mt-2 uppercase tracking-widest">Free Trial</span>
              </div>
            </div>

            <div class="space-y-8">
              <div class="bg-white/50 border-4 border-white p-10 rounded-[40px]">
                <div class="text-slate-400 font-bold text-3xl uppercase mb-4">Active Route</div>
                <div class="flex justify-between items-center text-5xl font-black text-slate-900">
                  <span>Shenzhen, CN</span>
                  <svg class="w-12 h-12 text-safety-orange" fill="currentColor" viewBox="0 0 20 20"><path d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" /></svg>
                  <span>London, UK</span>
                </div>
              </div>

              <div id="btn-generate" class="w-full bg-safety-orange text-white text-[80px] font-black py-14 rounded-[40px] text-center shadow-[0_20px_60px_rgba(249,115,22,0.4)] cursor-pointer">
                GENERATE
              </div>
            </div>
          </div>
        </div>

        <!-- Audio Cue: Whoosh + Click -->
        <div class="audio-cue" data-time="3.5" data-label="whoosh-clean"></div>
        <div class="audio-cue" data-time="6.0" data-label="mechanical-click"></div>
      </div>

      <!-- SCENE 3: THE MAGIC (8.0 - 12.5s) -->
      <div class="clip z-30 bg-white" id="s3" data-start="8.0" data-duration="4.5">
        <div id="map" class="absolute inset-0 z-0 opacity-0"></div>
        <div class="map-dim"></div>

        <div class="tiktok-text top-[10%] text-slate-900 text-[100px] leading-tight" id="s3-text">
          SIMULATE LOGISTICS.<br>GET PAID NOW.
        </div>

        <div class="absolute top-40 w-full px-10">
          <div class="glass-ui w-full p-16" id="status-card">
            <div class="flex justify-between items-center mb-12">
              <div>
                <div class="text-slate-400 font-bold text-3xl mb-2 uppercase">Tracking ID</div>
                <div class="text-slate-900 font-black text-6xl">VNT-99120-UK</div>
              </div>
              <div class="bg-orange-100 px-8 py-4 rounded-3xl border-4 border-orange-200">
                <div id="live-status" class="text-safety-orange font-black text-5xl">PROCESSING</div>
              </div>
            </div>

            <div class="relative h-8 bg-slate-100 rounded-full overflow-hidden border-4 border-white mb-8">
              <div id="progress-bar" class="absolute inset-y-0 left-0 bg-safety-orange w-0"></div>
            </div>
            
            <div class="flex justify-between text-slate-400 font-bold text-3xl uppercase tracking-widest">
              <span>Origin</span>
              <span id="kept-funds-callout" class="text-slate-900">Kept Funds</span>
              <span>Delivered</span>
            </div>
          </div>
        </div>

        <!-- Audio Cue: Data Processing -->
        <div class="audio-cue" data-time="8.5" data-label="data-processing"></div>
      </div>

      <!-- SCENE 4: FINALE (12.5 - 16.5s) -->
      <div class="clip z-40 bg-slate-900" id="s4" data-start="12.5" data-duration="4.0">
        <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#fff 2px, transparent 2px); background-size: 60px 60px;"></div>
        
        <div class="flex flex-col items-center justify-start h-full text-center px-10 pt-60">
          <div id="final-logo" class="w-64 h-64 bg-safety-orange rounded-[60px] mb-20 flex items-center justify-center shadow-[0_0_150px_rgba(249,115,22,0.6)]">
            <svg class="w-40 h-40 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4"><path d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
          </div>
        </div>

        <!-- Audio Cue: Cha-ching -->
        <div class="audio-cue" data-time="13.0" data-label="cha-ching"></div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      gsap.registerPlugin(TextPlugin);

      const mainTl = gsap.timeline({ paused: true });

      const speak = (text) => {
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'en-US';
        msg.rate = 1.2;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(msg);
      };

      const animateSubtitles = (text, duration, startTime) => {
        const container = document.getElementById('subtitles');
        const sceneGroup = document.createElement('div');
        sceneGroup.style.display = 'none';
        container.appendChild(sceneGroup);

        mainTl.set(sceneGroup, { display: 'block' }, startTime);

        const words = text.split(' ');
        words.forEach((word, i) => {
          const span = document.createElement('span');
          span.innerText = word;
          span.className = 'subtitle-word';
          // Snappy initial state
          gsap.set(span, { scale: 0.5, opacity: 0, rotation: Math.random() * 10 - 5 });
          sceneGroup.appendChild(span);
          
          // Much tighter delay for "rapid fire" feel
          const wordDelay = (duration / words.length) * i;
          
          // Snappy Pop (0.1s)
          mainTl.to(span, { 
            opacity: 1, 
            scale: 1.2, 
            rotation: 0,
            color: '#ffffff',
            duration: 0.1, 
            ease: 'back.out(2)' 
          }, startTime + wordDelay);
          
          mainTl.to(span, { 
            scale: 1, 
            color: '#FFD700',
            duration: 0.1,
            ease: 'power2.out'
          }, startTime + wordDelay + 0.08);
        });

        mainTl.set(sceneGroup, { display: 'none' }, startTime + duration);
      };

      function createNotificationRain() {
        const container = document.getElementById('notif-rain-container');
        container.innerHTML = ''; // Clear previous
        const types = [
          { label: 'STRIPE', text: 'Account Restricted', color: 'text-blue-600', icon: 'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z' },
          { label: 'CHARGEBACK', text: '-$1,200.00 Dispute', color: 'text-red-600', icon: 'M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' },
          { label: 'SUPPORT', text: '"Where is my order???"', color: 'text-slate-600', icon: 'M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z' }
        ];

        for (let i = 0; i < 15; i++) {
          const type = types[i % types.length];
          const div = document.createElement('div');
          div.className = 'notif-rain';
          div.style.opacity = '0.7'; // Subtle background feel
          div.innerHTML = `
            <div class="w-16 h-16 bg-white/90 rounded-full flex items-center justify-center">
              <svg class="w-10 h-10 ${type.color}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="${type.icon}" /></svg>
            </div>
            <div>
              <div class="${type.color} font-black text-2xl uppercase tracking-tighter">${type.label}</div>
              <div class="text-slate-900 font-bold text-3xl">${type.text}</div>
            </div>
          `;
          
          // Wider spread to avoid covering the center
          const x = (i % 2 === 0) ? Math.random() * 200 : 600 + Math.random() * 200; 
          const y = 100 + Math.random() * 1600;
          const rot = -20 + Math.random() * 40;
          
          container.appendChild(div);
          
          mainTl.fromTo(div, 
            { x: x, y: y + 300, opacity: 0, scale: 0.4, rotation: rot },
            { x: x, y: y, opacity: 0.7, scale: 1, duration: 0.4, ease: 'back.out(1.2)' }, 
            1.5 + (i * 0.12)
          );
          
          mainTl.to(div, { opacity: 0, scale: 0.8, y: y - 150, duration: 0.3 }, 4.3);
        }
      }

      let map, marker, route;
      function initMap() {
        if (map) return;
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([22.5431, 114.0579], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png').addTo(map);
        
        const origin = [22.5431, 114.0579];
        const dest = [51.5074, -0.1278];
        
        L.marker(dest, { icon: L.divIcon({ className: 'dest-marker', iconSize: [40, 40] }) }).addTo(map);
        marker = L.marker(origin, { icon: L.divIcon({ className: 'custom-marker', iconSize: [30, 30] }) }).addTo(map);
        route = L.polyline([origin, origin], { color: '#F97316', weight: 10, lineCap: 'round', dashArray: '20, 20' }).addTo(map);
      }

      // --- Animation Orchestration ---

      // SCENE 0: VIDEO INTRO (0.0s - 1.1s)
      const video = document.getElementById('intro-video');
      
      mainTl.call(() => {
        document.querySelectorAll('.clip').forEach(c => c.classList.remove('active'));
        document.getElementById('s0').classList.add('active');
        if (video) {
          video.currentTime = 0;
          video.play().catch(e => console.log("Video play blocked:", e));
        }
      }, null, 0);

      mainTl.fromTo('#intro-iphone', 
        { scale: 0.9, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.4, ease: 'power2.out' }, 
        0
      );
      
      // Explosion transition out
      mainTl.to('#intro-iphone', {
        scale: 4,
        opacity: 0,
        filter: 'blur(20px)',
        duration: 0.4,
        ease: 'power2.in'
      }, 0.7);

      mainTl.to('#s0', { opacity: 0, duration: 0.3 }, 1.0);

      // SCENE 1: THE PAIN (1.1s - 4.1s)
      mainTl.set('#s1', { display: 'flex' }, 1.0);
      
      mainTl.call(() => { 
        document.querySelectorAll('.clip').forEach(c => c.classList.remove('active')); 
        document.getElementById('s1').classList.add('active'); 
        speak("PayPal holds? Funds frozen?");
      }, null, 1.1);

      mainTl.fromTo('#s1', { scale: 1.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: 'power4.out' }, 1.1);
      
      animateSubtitles("PAYPAL HOLDS? FUNDS FROZEN?", 3, 1.1);
      createNotificationRain();
      
      mainTl.fromTo('#paypal-alert', 
        { y: 200, opacity: 0, scale: 0.8 },
        { y: -160, opacity: 1, scale: 1, duration: 0.6, ease: 'back.out(1.4)' }, 
        1.1
      );

      // SCENE 2: SECRET (4.5 - 8.0)
      mainTl.call(() => { 
        document.querySelectorAll('.clip').forEach(c => c.classList.remove('active')); 
        document.getElementById('s2').classList.add('active'); 
        speak("The secret? Track-App generates movement.");
      }, null, 4.5);
      animateSubtitles("THE SECRET? TRACK-APP GENERATES MOVEMENT.", 3.5, 4.5);
      mainTl.from('#admin-card', { y: 1500, duration: 0.7, ease: 'power3.out' }, 4.7);
      mainTl.to('#btn-generate', { scale: 0.9, duration: 0.1 }, 6.5);
      mainTl.to('#btn-generate', { scale: 1, duration: 0.2, backgroundColor: '#3B82F6', text: 'GENERATING...' }, 6.6);
      mainTl.to('#s2-ui-container', { scale: 8, opacity: 0, duration: 0.5, ease: 'power4.in' }, 7.5);

      // SCENE 3: MAGIC (8.0 - 12.5)
      mainTl.call(() => { 
        document.querySelectorAll('.clip').forEach(c => c.classList.remove('active')); 
        document.getElementById('s3').classList.add('active');
        initMap();
        speak("Simulate logistics. Get paid now.");
      }, null, 8.0);
      animateSubtitles("SIMULATE LOGISTICS. GET PAID NOW.", 4.5, 8.0);
      mainTl.to('#map', { opacity: 1, duration: 0.5 }, 8.5);
      mainTl.from('#status-card', { y: -500, duration: 0.6, ease: 'power3.out' }, 8.8);
      mainTl.to('#progress-bar', { width: '100%', duration: 3.5, ease: 'none' }, 9.0);
      mainTl.to('#live-status', { text: 'OUT FOR DELIVERY', duration: 0.1 }, 11.0);
      mainTl.to('#kept-funds-callout', { color: '#F97316', scale: 1.2, duration: 0.3, yoyo: true, repeat: 1 }, 11.0);

      mainTl.to({}, { 
        duration: 3.5, 
        onUpdate: function() {
          if(!marker) return;
          const p = (this.time() - 9.0) / 3.5;
          if (p < 0 || p > 1) return;
          const start = [22.5431, 114.0579], end = [51.5074, -0.1278];
          const lat = start[0] + (end[0] - start[0]) * p;
          const lng = start[1] + (end[1] - start[1]) * p;
          marker.setLatLng([lat, lng]);
          route.setLatLngs([start, [lat, lng]]);
          map.panTo([lat, lng], { animate: false });
        }
      }, 9.0);

      // SCENE 4: FINALE (12.5 - 16.5)
      mainTl.call(() => { 
        document.querySelectorAll('.clip').forEach(c => c.classList.remove('active')); 
        document.getElementById('s4').classList.add('active');
